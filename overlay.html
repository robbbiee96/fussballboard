<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>WM 2026 - TV Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto+Mono:wght@700&display=swap');

        :root {
            /* Magische Formel: 1rem entspricht jetzt exakt der Auflösung, die du in OBS einträgst.
               Das Overlay skaliert sich mathematisch selbst und bleibt immer knackscharf. */
            font-size: calc(100vw / 19.2); 
        }

        body { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            background-color: transparent; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            padding-top: 0.5rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .bug-container {
            display: flex;
            align-items: center;
            position: relative;
        }

        /* --- DER TIMER (Links) --- */
        .timer-container {
            background: #ffffff;
            height: 0.48rem;
            padding: 0 0.35rem 0 0.2rem; 
            border-radius: 0.24rem 0 0 0.24rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0.7rem;
            margin-right: -0.25rem; 
            z-index: 1;
            box-shadow: -0.05rem 0.08rem 0.15rem rgba(0,0,0,0.4);
        }

        .time-text { font-size: 0.26rem; font-weight: 900; color: #000; }
        .stoppage-text { color: #ff4757; font-size: 0.2rem; font-weight: 900; margin-left: 0.06rem; display: none; }

        /* --- DER HAUPTBALKEN (Rechts) --- */
        .main-bug-wrapper {
            background: linear-gradient(90deg, #ff4757, #5ee0b1, #b862ff);
            padding: 0 0.02rem 0.03rem 0.02rem; 
            border-radius: 0.26rem; 
            z-index: 2;
            box-shadow: 0 0.08rem 0.15rem rgba(0,0,0,0.5);
        }

        .main-black-bar {
            background: #0a0a0a;
            height: 0.48rem;
            border-radius: 0.24rem;
            display: flex;
            align-items: center;
            padding: 0 0.15rem;
            position: relative;
        }

        /* TEAM STYLING */
        .team-section { display: flex; align-items: center; gap: 0.1rem; width: 1.4rem; }
        .team-section.left { justify-content: flex-start; }
        .team-section.right { justify-content: flex-end; }

        .flag { width: 0.32rem; height: 0.22rem; object-fit: cover; border-radius: 0.03rem; border: 0.01rem solid rgba(255,255,255,0.1); }
        .card-dot { width: 0.08rem; height: 0.08rem; border-radius: 50%; border: 0.02rem solid #555; }
        .team-name { font-size: 0.26rem; font-weight: 900; color: #ffffff; letter-spacing: 0.01rem; }

        /* SCORE BOXEN */
        .score-box {
            background: #5ee0b1; color: #000; font-size: 0.3rem; font-weight: 900;
            height: 0.36rem; width: 0.44rem; display: flex; justify-content: center;
            align-items: center; border-radius: 0.08rem; margin: 0 0.04rem;
        }

        /* MITTEL-LOGO */
        .logo-pill {
            background: #ffffff; width: 0.5rem; height: 0.68rem; border-radius: 0.25rem;
            display: flex; justify-content: center; align-items: center; z-index: 10;
            margin: 0 -0.05rem;
            box-shadow: 0 0.06rem 0.15rem rgba(0,0,0,0.5);
        }
        .logo-pill img { height: 0.5rem; object-fit: contain; }

        /* --- ELFMETERSCHIEßEN PILLE --- */
        .penalty-pill {
            position: absolute;
            top: 0.56rem; 
            left: 50%;
            transform: translateX(-35%); 
            background: #0a0a0a;
            color: #ffffff;
            padding: 0.08rem 0.25rem;
            border-radius: 0 0 0.14rem 0.14rem;
            display: flex;
            gap: 0.15rem;
            align-items: center;
            z-index: 0;
            border: 0.01rem solid #222;
            border-top: none;
            box-shadow: 0 0.08rem 0.15rem rgba(0,0,0,0.5);
            display: none; 
        }

        .pen-text { color: #fbc531; font-size: 0.15rem; font-weight: 900; letter-spacing: 0.01rem; }

        /* Elfmeter-Punkte */
        .pen-dots-container { display: flex; gap: 0.06rem; }
        .pen-dot {
            width: 0.12rem; height: 0.12rem; border-radius: 50%;
            background: transparent; border: 0.02rem solid #555;
            transition: all 0.3s ease;
        }
        .pen-dot.scored { background: #5ee0b1; border-color: #5ee0b1; box-shadow: 0 0 0.08rem rgba(94, 224, 177, 0.6); }
        .pen-dot.missed { background: #ff4757; border-color: #ff4757; box-shadow: 0 0 0.08rem rgba(255, 71, 87, 0.6); }

        @keyframes goalFlash { 
            0% { background: #5ee0b1; color: #000; } 
            50% { background: #fff; color: #000; transform: scale(1.1); } 
            100% { background: #5ee0b1; color: #000; } 
        }
        .goal-anim { animation: goalFlash 0.8s ease-in-out; }

    </style>
</head>
<body>

    <div class="bug-container">
        
        <div class="timer-container">
            <span class="time-text" id="main-time">00:00</span>
            <span class="stoppage-text" id="stoppage-time">+0:00</span>
        </div>

        <div class="main-bug-wrapper">
            <div class="main-black-bar">
                
                <div class="team-section left">
                    <img src="https://flagcdn.com/fr.svg" class="flag" id="flag1">
                    <div class="card-dot" id="card1"></div>
                    <span class="team-name" id="team1-name">FRA</span>
                </div>

                <div class="score-box" id="score1">0</div>

                <div class="logo-pill">
                    <img src="https://raw.githubusercontent.com/onikcreation/fifa-world-cup-2026/main/2026_FIFA_World_Cup_Emblem.png" alt="FIFA">
                </div>

                <div class="score-box" id="score2">0</div>

                <div class="team-section right">
                    <span class="team-name" id="team2-name">SEN</span>
                    <div class="card-dot" id="card2"></div>
                    <img src="https://flagcdn.com/sn.svg" class="flag" id="flag2">
                </div>

            </div>
            
            <div class="penalty-pill" id="penalty-pill">
                <div class="pen-dots-container" id="pen1-dots"></div>
                <span class="pen-text">PEN</span>
                <div class="pen-dots-container" id="pen2-dots"></div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcj87AF4IXH_kChN6QLkbW-M_7SUqesRQ",
            authDomain: "twitch-scoreboard-obs.firebaseapp.com",
            databaseURL: "https://twitch-scoreboard-obs-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "twitch-scoreboard-obs",
            storageBucket: "twitch-scoreboard-obs.firebasestorage.app",
            messagingSenderId: "525252191026",
            appId: "1:525252191026:web:b14958e56b30cb39036d2b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let serverOffset = 0;
        onValue(ref(db, ".info/serverTimeOffset"), (snap) => { serverOffset = snap.val() || 0; });
        const getSyncedTime = () => Date.now() + serverOffset;

        let matchState = null;
        let previousState = null;

        function triggerGoal(id) {
            const el = document.getElementById(id);
            el.classList.remove('goal-anim');
            void el.offsetWidth;
            el.classList.add('goal-anim');
        }

        function renderPenDots(containerId, shotsArray) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const shots = shotsArray || [];
            const totalDots = Math.max(5, shots.length);

            for (let i = 0; i < totalDots; i++) {
                const dot = document.createElement('div');
                dot.className = 'pen-dot';
                if (i < shots.length) {
                    if (shots[i] === 1) dot.classList.add('scored');
                    else if (shots[i] === 0) dot.classList.add('missed');
                }
                container.appendChild(dot);
            }
        }

        onValue(ref(db, 'match/'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            if (previousState) {
                if (data.s1 > previousState.s1) triggerGoal('score1');
                if (data.s2 > previousState.s2) triggerGoal('score2');
            }

            document.getElementById('team1-name').innerText = data.t1;
            document.getElementById('flag1').src = `https://flagcdn.com/${data.f1}.svg`;
            document.getElementById('score1').innerText = data.s1;
            
            document.getElementById('team2-name').innerText = data.t2;
            document.getElementById('flag2').src = `https://flagcdn.com/${data.f2}.svg`;
            document.getElementById('score2').innerText = data.s2;

            renderPenDots('pen1-dots', data.p1_shots);
            renderPenDots('pen2-dots', data.p2_shots);

            const hasPenalties = (data.p1_shots && data.p1_shots.length > 0) || (data.p2_shots && data.p2_shots.length > 0);
            const penPill = document.getElementById('penalty-pill');
            
            if (data.mode === 'pen' || hasPenalties) {
                penPill.style.display = 'flex';
            } else {
                penPill.style.display = 'none';
            }

            matchState = data;
            previousState = { ...data };
            updateTimer();
        });

        function formatTime(s) {
            let m = Math.floor(s / 60);
            let sec = s % 60;
            return (m < 10 ? "0" : "") + m + ":" + (sec < 10 ? "0" : "") + sec;
        }

        function updateTimer() {
            if (!matchState) return;
            const timeEl = document.getElementById('main-time');
            const stopEl = document.getElementById('stoppage-time');

            if (matchState.mode !== "normal") {
                stopEl.style.display = 'none';
                
                if (matchState.mode === 'pen') {
                    const s1 = matchState.p1_shots || [];
                    const s2 = matchState.p2_shots || [];
                    
                    const sum1 = s1.reduce((a, b) => a + b, 0);
                    const sum2 = s2.reduce((a, b) => a + b, 0);
                    
                    const rem1 = Math.max(0, 5 - s1.length);
                    const rem2 = Math.max(0, 5 - s2.length);

                    let isDecided = false;
                    
                    if (sum1 > sum2 + rem2 || sum2 > sum1 + rem1) {
                        isDecided = true;
                    } 
                    else if (s1.length >= 5 && s2.length >= 5 && s1.length === s2.length && sum1 !== sum2) {
                        isDecided = true;
                    }

                    timeEl.innerText = isDecided ? "ENDE" : "PEN";
                    return;
                }
                
                if (matchState.mode === 'end') timeEl.innerText = "ENDE";
                else if (matchState.mode === 'ht') timeEl.innerText = "HT";
                else if (matchState.mode === 'ht_et') timeEl.innerText = "HT VERL.";
                return;
            }

            let total = matchState.baseSec;
            if (matchState.running) {
                total += Math.floor((getSyncedTime() - matchState.startTs) / 1000);
            }

            let display = total;
            let stop = 0;
            
            if (matchState.half == 1 && total >= 2700) { display = 2700; stop = total - 2700; }
            if (matchState.half == 2 && total >= 5400) { display = 5400; stop = total - 5400; }
            if (matchState.half == 3 && total >= 6300) { display = 6300; stop = total - 6300; } 
            if (matchState.half == 4 && total >= 7200) { display = 7200; stop = total - 7200; } 

            timeEl.innerText = formatTime(display);
            
            if (stop > 0) {
                let stopM = Math.floor(stop / 60);
                let stopS = stop % 60;
                stopEl.innerText = "+" + stopM + ":" + (stopS < 10 ? "0" : "") + stopS;
                stopEl.style.display = 'inline';
            } else {
                stopEl.style.display = 'none';
            }
        }

        setInterval(updateTimer, 200);
    </script>
</body>
</html>
