<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scoreboard Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,900&display=swap');

        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: #1a1a24; -webkit-font-smoothing: antialiased; }
        
        .controls { margin: 40px auto; background: #23232f; padding: 25px; border-radius: 12px; color: white; display: flex; flex-wrap: wrap; gap: 12px; max-width: 850px; justify-content: center; border: 2px solid #111; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .controls h3 { width: 100%; text-align: center; margin-top: 0; color: #a5a5b9; font-size: 13px; letter-spacing: 2px; }
        .controls input { padding: 10px; font-size: 16px; text-align: center; border-radius: 6px; background: #1a1a24; color: white; font-weight: bold; border: 1px solid #555; box-sizing: border-box; }
        .controls input[type="number"]::-webkit-outer-spin-button, .controls input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .controls input[type="number"] { -moz-appearance: textfield; }
        
        button { padding: 12px 18px; font-size: 14px; cursor: pointer; border: none; border-radius: 6px; background: #2ed573; font-weight: bold; text-transform: uppercase; transition: transform 0.1s, opacity 0.2s; }
        button:active { transform: scale(0.96); opacity: 0.8; }
        .btn-main { padding: 16px 24px; font-size: 16px; min-width: 140px; flex: 1; }
        .btn-large { width: 100%; max-width: 660px; padding: 20px; font-size: 20px; letter-spacing: 1px; }
        .btn-red { background: #ff4757; color: white; } .btn-blue { background: #1e90ff; color: white; } .btn-gray { background: #57606f; color: white; } .btn-yellow { background: #fbc531; color: #111; }
        
        hr { width: 100%; border: none; border-top: 1px solid #3a3a4c; margin: 12px 0; }
        
        .control-group { display: flex; gap: 10px; align-items: center; justify-content: center; width: 100%; flex-wrap: wrap;}
        .team-group { display: flex; gap: 10px; align-items: flex-end; }
        .input-box { display: flex; flex-direction: column; gap: 4px; }
        .input-box label { font-size: 11px; color: #8a8a9e; text-transform: uppercase; }
        #status { text-align: center; color: #8a8a9e; font-size: 12px; width: 100%; margin-top: 10px; min-height: 15px; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a24; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; padding: 20px; text-align: center; box-sizing: border-box; }
        #main-app { display: none; }

        @media (max-width: 768px) {
            .controls { margin: 15px; padding: 15px; gap: 15px; }
            button { padding: 16px; font-size: 15px; width: 100%; }
            .control-group { gap: 10px; flex-direction: column; width: 100%; }
            .control-group.row-layout { flex-direction: row; flex-wrap: wrap; }
            .control-group.row-layout button { flex: 1 1 45%; }
            .team-group { width: 100%; }
            .team-group .input-box:first-child { flex: 2; }
            .team-group .input-box:last-child { flex: 1; }
            .team-group input { width: 100% !important; }
            .btn-main { min-width: 100%; }
            .btn-large { padding: 20px; font-size: 18px; }
            .time-setter { flex-direction: row; width: 100%; }
            .time-setter .input-box { flex: 1; }
            .time-setter input { width: 100% !important; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color: white; font-family: 'Montserrat', sans-serif;">Moderator Login</h2>
        <p style="color: #8a8a9e; margin-bottom: 20px;">Bitte autorisiere dich, um das Scoreboard zu steuern.</p>
        <button id="btn-login" style="background: #ffffff; color: #333; padding: 15px 30px; font-size: 16px; border-radius: 8px;">Mit Google einloggen</button>
    </div>

    <div id="main-app" class="controls">
        <h3>Stream Deck / Mobile Control Panel</h3>
        <div class="control-group">
            <div class="team-group">
                <div class="input-box"><label>Heim</label><input type="text" id="input-team1" value="GER" style="width: 120px;"></div>
                <div class="input-box"><label>Flagge</label><input type="text" id="input-flag1" value="de" style="width: 50px;"></div>
            </div>
            <div class="team-group">
                <div class="input-box"><label>Gast</label><input type="text" id="input-team2" value="FIN" style="width: 120px;"></div>
                <div class="input-box"><label>Flagge</label><input type="text" id="input-flag2" value="fi" style="width: 50px;"></div>
            </div>
            <button class="btn-gray" onclick="updateTeams()">Teams Update</button>
        </div>
        <hr>
        <div class="control-group row-layout">
            <button class="btn-blue" onclick="changeScore(1, 1)">Tor Heim [1]</button>
            <button class="btn-red" onclick="changeScore(1, -1)">-1 Heim [5]</button>
            <button class="btn-blue" onclick="changeScore(2, 1)">Tor Gast [2]</button>
            <button class="btn-red" onclick="changeScore(2, -1)">-1 Gast [6]</button>
        </div>
        <hr>
        <div class="control-group">
            <button class="btn-yellow btn-large" onclick="toggleTimer()">Start / Pause [Leertaste]</button>
        </div>
        <div class="control-group row-layout" style="margin-top: 5px;">
            <button class="btn-main" onclick="setHalf(1)">Start 1. HZ [T]</button>
            <button class="btn-blue btn-main" onclick="setMode('halftime')">Halbzeit [H]</button>
            <button class="btn-main" onclick="setHalf(2)">Start 2. HZ [Z]</button>
            <button class="btn-red btn-main" onclick="setMode('end')">Spielende [J]</button>
        </div>
        <div class="control-group time-setter" style="margin-top: 10px;">
            <div class="input-box"><label>Minuten</label><input type="number" id="input-min" value="0" min="0" max="90" style="width: 80px;"></div>
            <div class="input-box"><label>Sekunden</label><input type="number" id="input-sec" value="0" min="0" max="59" style="width: 80px;"></div>
            <button class="btn-gray" onclick="setManualTime()">Zeit fixieren</button>
        </div>
        <div class="control-group" style="margin-top: 20px;">
            <button class="btn-gray" id="btn-logout" style="background: #444;">Ausloggen</button>
        </div>
        <div id="status">Verbinde mit Datenbank...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
        // NEU: 'update' importiert für den Test-Schreibvorgang
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcj87AF4IXH_kChN6QLkbW-M_7SUqesRQ",
            authDomain: "twitch-scoreboard-obs.firebaseapp.com",
            databaseURL: "https://twitch-scoreboard-obs-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "twitch-scoreboard-obs",
            storageBucket: "twitch-scoreboard-obs.firebasestorage.app",
            messagingSenderId: "525252191026",
            appId: "1:525252191026:web:b14958e56b30cb39036d2b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let serverOffset = 0;
        onValue(ref(db, ".info/serverTimeOffset"), (snap) => {
            serverOffset = snap.val() || 0;
        });
        const getSyncedTime = () => Date.now() + serverOffset;

        let state = {
            t1: "GER", f1: "de", s1: 0,
            t2: "FIN", f2: "fi", s2: 0,
            running: false, baseSec: 0, startTs: getSyncedTime(), half: 1, mode: "normal" 
        };

        document.getElementById('btn-login').addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(error => console.error("Login Fehler:", error));
        });

        const btnLogout = document.getElementById('btn-logout');
        if(btnLogout) {
            btnLogout.addEventListener('click', () => { signOut(auth); });
        }

        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('btn-login');
            
            if (user) {
                if (loginBtn) {
                    loginBtn.innerText = "Prüfe Schreibrechte in Firebase...";
                    loginBtn.style.background = "#fbc531";
                    loginBtn.style.color = "#111";
                    loginBtn.disabled = true;
                }
                
                // 1. Zuerst lesen wir den aktuellen Stand (das darf wegen .read: true jeder)
                get(ref(db, 'match/')).then((snapshot) => {
                    let currentState = snapshot.exists() ? snapshot.val() : state;

                    // 2. DAS IST DER NEUE SICHERHEITSTEST: 
                    // Wir versuchen unsichtbar einen kleinen "Ping" in die Datenbank zu schreiben,
                    // WÄHREND das Login-Fenster noch offen ist.
                    update(ref(db, 'match/'), { _ping: Date.now() })
                        .then(() => {
                            // ERFOLG! Firebase hat das Schreiben erlaubt.
                            // JETZT blendet sich das Login-Fenster aus und das Panel ein.
                            state = { ...state, ...currentState };
                            document.getElementById('input-team1').value = state.t1;
                            document.getElementById('input-flag1').value = state.f1;
                            document.getElementById('input-team2').value = state.t2;
                            document.getElementById('input-flag2').value = state.f2;
                            
                            document.getElementById('login-screen').style.display = 'none';
                            document.getElementById('main-app').style.display = 'flex';
                            enableHotkeys();

                            const statusEl = document.getElementById('status');
                            if (statusEl) {
                                statusEl.innerText = "Datenbank verbunden. Admin-Rechte bestätigt.";
                                statusEl.style.color = "#2ed573";
                            }
                        })
                        .catch((error) => { 
                            // FEHLER! Firebase blockt den Schreibbefehl.
                            // Wir zeigen sofort den Error-Screen. Das Panel wurde nie geladen.
                            showErrorScreen("Der Server hat blockiert. UID: " + user.uid); 
                        });

                }).catch((error) => { 
                    showErrorScreen("Fehler beim Lesen der Datenbank."); 
                });
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
                
                if (loginBtn) {
                    loginBtn.innerText = "Mit Google einloggen";
                    loginBtn.style.background = "#ffffff";
                    loginBtn.style.color = "#333";
                    loginBtn.disabled = false;
                }
            }
        });

        function showErrorScreen(reasonMsg) {
            document.getElementById('login-screen').style.display = 'none';
            const mainApp = document.getElementById('main-app');
            mainApp.style.display = 'flex';
            
            mainApp.innerHTML = `
                <div style="text-align: center; width: 100%; padding: 40px 0;">
                    <h2 style="color: #ff4757; font-size: 32px; margin-bottom: 10px; font-family: 'Montserrat', sans-serif;">ZUGRIFF VERWEIGERT</h2>
                    <p style="color: #8a8a9e; font-size: 16px; margin-bottom: 15px;">Dein Account besitzt keine Admin-Rechte.</p>
                    <p style="color: #57606f; font-size: 12px; margin-bottom: 40px; font-family: monospace;">${reasonMsg}</p>
                    <button id="btn-logout-error" style="background: #444; color: white; padding: 15px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; text-transform: uppercase;">Zurück zum Login</button>
                </div>
            `;
            document.getElementById('btn-logout-error').addEventListener('click', () => {
                signOut(auth).then(() => window.location.reload());
            });
        }

        function sync() {
            set(ref(db, 'match/'), state).then(() => {
                const statusEl = document.getElementById('status');
                if (statusEl) {
                    statusEl.innerText = "Änderung gespeichert.";
                    statusEl.style.color = "#2ed573";
                    setTimeout(() => { statusEl.innerText = "Datenbank aktiv. Änderungen live."; }, 2000);
                }
            }).catch((error) => { showErrorScreen("Verbindung verloren."); });
        }

        window.updateTeams = () => {
            state.t1 = document.getElementById('input-team1').value; state.f1 = document.getElementById('input-flag1').value.toLowerCase();
            state.t2 = document.getElementById('input-team2').value; state.f2 = document.getElementById('input-flag2').value.toLowerCase(); sync();
        };

        window.changeScore = (team, amount) => {
            if (team === 1) state.s1 = Math.max(0, state.s1 + amount);
            if (team === 2) state.s2 = Math.max(0, state.s2 + amount); sync();
            navigator.vibrate && navigator.vibrate(50);
        };

        window.toggleTimer = () => {
            if (state.running) { state.baseSec += Math.floor((getSyncedTime() - state.startTs) / 1000); state.running = false; } 
            else { state.startTs = getSyncedTime(); state.running = true; if(state.mode !== "normal") state.mode = "normal"; } sync();
            navigator.vibrate && navigator.vibrate(50);
        };

        window.setHalf = (half) => {
            state.half = half; state.baseSec = (half === 1) ? 0 : 45 * 60; state.startTs = getSyncedTime(); state.running = true; state.mode = "normal"; sync();
            navigator.vibrate && navigator.vibrate(50);
        };

        window.setMode = (mode) => {
            if (state.running) { state.baseSec += Math.floor((getSyncedTime() - state.startTs) / 1000); state.running = false; }
            state.mode = mode; sync();
            navigator.vibrate && navigator.vibrate(50);
        };

        window.setManualTime = () => {
            let m = parseInt(document.getElementById('input-min').value) || 0; let s = parseInt(document.getElementById('input-sec').value) || 0;
            if (m > 90) m = 90; if (m < 0) m = 0; if (s > 59) s = 59; if (s < 0) s = 0;
            state.baseSec = (m * 60) + s; state.startTs = getSyncedTime(); if(state.mode !== "normal") state.mode = "normal"; sync();
            navigator.vibrate && navigator.vibrate(50);
        };

        window.enableHotkeys = () => {
            document.addEventListener('keydown', (e) => {
                if(document.activeElement.tagName === 'INPUT') return; 
                switch(e.key.toLowerCase()) {
                    case '1': window.changeScore(1, 1); break; case '2': window.changeScore(2, 1); break;
                    case 't': window.setHalf(1); break; case 'z': window.setHalf(2); break;
                    case 'h': window.setMode('halftime'); break; case 'j': window.setMode('end'); break;
                    case '5': window.changeScore(1, -1); break; case '6': window.changeScore(2, -1); break;
                    case ' ': e.preventDefault(); window.toggleTimer(); break;
                }
            });
        };
    </script>
</body>
</html>
