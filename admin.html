<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Scoreboard Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,900&display=swap');

        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: #1a1a24; -webkit-font-smoothing: antialiased; }
        .controls { margin: 40px auto; background: #23232f; padding: 25px; border-radius: 12px; color: white; display: flex; flex-wrap: wrap; gap: 12px; max-width: 850px; justify-content: center; border: 2px solid #111; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .controls h3 { width: 100%; text-align: center; margin-top: 0; color: #a5a5b9; font-size: 13px; letter-spacing: 2px; }
        .controls input { padding: 10px; font-size: 16px; text-align: center; border-radius: 6px; background: #1a1a24; color: white; font-weight: bold; border: 1px solid #555;}
        button { padding: 12px 18px; font-size: 14px; cursor: pointer; border: none; border-radius: 6px; background: #2ed573; font-weight: bold; text-transform: uppercase; transition: background 0.3s ease; }
        
        /* Buttons für Sichtbarkeit */
        .btn-visible { background: #2ed573; color: #000; } /* GRÜN wenn sichtbar */
        .btn-hidden { background: #ff4757; color: white; } /* ROT wenn versteckt */
        
        .btn-large { width: 100%; max-width: 660px; padding: 20px; font-size: 20px; letter-spacing: 1px; }
        .btn-red { background: #ff4757; color: white; } .btn-blue { background: #1e90ff; color: white; } .btn-gray { background: #57606f; color: white; } .btn-yellow { background: #fbc531; color: #111; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a24; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #main-app { display: none; flex-direction: column; align-items: center; gap: 15px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color: white; font-family: 'Montserrat', sans-serif;">Moderator Login</h2>
        <button id="btn-login" style="background: #ffffff; color: #333; padding: 12px 24px; font-size: 16px;">Mit Google einloggen</button>
    </div>

    <div id="main-app" class="controls">
        <h3>Stream Deck Control Panel</h3>
        
        <button id="btn-visibility" class="btn-large btn-visible" onclick="toggleVisibility()">OVERLAY IST SICHTBAR</button>
        
        <hr>
        </div>

    <script type="module">
        // ... (Imports und FirebaseConfig wie gehabt) ...

        // Funktion zum Umschalten mit visuellem Feedback
        window.toggleVisibility = async () => {
            const snapshot = await get(ref(db, 'match/'));
            if(snapshot.exists()) state = snapshot.val();
            
            state.visible = !state.visible;
            
            // UI Update
            const btn = document.getElementById('btn-visibility');
            if (state.visible) {
                btn.className = "btn-large btn-visible";
                btn.innerText = "OVERLAY IST SICHTBAR";
            } else {
                btn.className = "btn-large btn-hidden";
                btn.innerText = "OVERLAY IST VERBORGEN";
            }
            
            sync();
        };

        // ... (Rest deiner Funktionen) ...
    </script>
</body>
</html>
